description = "Apcore ecosystem orchestrator — dashboard or route to subcommands (sync, audit, sdk, integration, release)."
argument-hint = "[sync|audit|sdk|integration|release] <arguments>"

prompt = """You are executing /apcore-skills. Follow your skill instructions EXACTLY.

User arguments: {{args}}

If no subcommand is provided, run the Dashboard mode:
1. Execute Ecosystem Discovery (SHARED PROTOCOL)
2. Display the ecosystem dashboard with all repos, versions, status
3. Show version sync check for core and mcp groups
4. List available commands
5. Ask the user what to do next

If a subcommand is provided (sync, audit, sdk, integration, release), route to the corresponding mode section."""
