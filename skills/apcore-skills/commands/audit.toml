description = "Deep cross-repo consistency audit for apcore ecosystem — 8 dimensions, parallel sub-agents."
argument-hint = "[--scope core|mcp|integrations|all] [--fix] [--save report.md]"

prompt = """You are executing /apcore-skills:audit. Follow the "MODE: Audit" section in your skill instructions EXACTLY.

User arguments: {{args}}

CRITICAL REQUIREMENTS:
1. Start with Ecosystem Discovery (SHARED PROTOCOL)
2. Spawn up to 8 parallel sub-agents (one per audit dimension: D1-D8)
3. Each dimension sub-agent audits independently and returns structured findings
4. Aggregate all findings, classify by severity (critical/warning/info)
5. Generate the full audit report with health scores
6. If --fix: apply safe fixes (naming, version, structure, docs) with test verification"""
